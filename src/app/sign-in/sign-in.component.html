<div class="container">
  <div class="content-box">
    <div class="left"></div>
    <div class="right">
      <h2>Sign In</h2>
      <form [formGroup]="signinForm" (ngSubmit)="onSubmit()">
        <div>
          <div style="display: flex; justify-content: left;">
            <label for="email" style="padding-right: 10px;margin-top: 10px;">Email</label>
            <input id="email" type="email" formControlName="email">
          </div>
          <div *ngIf="signinForm.controls['email']?.invalid && (signinForm.controls['email']?.dirty || signinForm.controls['email']?.touched)">
            <div *ngIf="signinForm.controls['email']?.errors?.['required']" style="color: red; margin-bottom: 10px;">Email is required.</div>
            <div *ngIf="signinForm.controls['email']?.errors?.['email']" style="color: red; margin-bottom: 10px;">Email is invalid.</div>
          </div>
        </div>

        <div>
          <div style="display: flex; justify-content: left;">
            <label for="password" style="padding-right: 10px;margin-top: 10px;">Password</label>
            <input id="password" type="password" formControlName="password">
          </div>
          <div *ngIf="signinForm.controls['password']?.invalid && (signinForm.controls['password']?.dirty || signinForm.controls['password']?.touched)">
            <div *ngIf="signinForm.controls['password']?.errors?.['required']" style="color: red; margin-bottom: 10px;">Password is required.</div>
          </div>
        </div>
        <button type="submit" [disabled]="signinForm.invalid" class="btn">Sign In</button>
        <button type="button" (click)="forgotPassword()" class="forgot-btn">Forgot Password?</button>
      </form>

    </div>
  </div>
</div>
